version: 2
updates:
  # Keep the GitHub Actions pinned by commit SHA up to date with security and
  # version patches. Dependabot opens PRs that bump both the SHA and the
  # version comment in .github/workflows/.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
